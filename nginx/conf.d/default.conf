server {
    listen 80;
    server_name _;  # Accepts ANY Host header (vulnerable to Host header attacks)

    # === Non-DoS vulnerable settings (students: fix these!) ===
    server_tokens on;                 # Exposes nginx version in headers/error pages
    autoindex on;                     # Enables directory listing for static/media
    proxy_set_header Host $http_host; # Passes raw Host header to backend (Host header injection)

    # === DoS-vulnerable settings (students: fix these!) ===
    client_max_body_size 0;           # No limit on upload size
    client_body_timeout 300s;         # Wait 5 min for slow request bodies
    client_header_timeout 300s;       # Wait 5 min for slow headers (Slowloris)
    send_timeout 300s;                # Wait 5 min to send response
    keepalive_timeout 300s;           # Keep idle connections open 5 min
    keepalive_requests 10000;         # Allow 10k requests per connection
    proxy_read_timeout 600s;          # Wait 10 min for backend response
    proxy_connect_timeout 600s;       # Wait 10 min to connect to backend
    large_client_header_buffers 64 128k;  # Accept huge headers

    location / {
        proxy_pass http://web:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://web:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }



    # Optional: Serve static files directly
    location /static {
        alias /app/static;   # Missing trailing slashes = path traversal!
    }

    location /media {
        alias /app/media;    # Missing trailing slashes = path traversal!
    }

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;  # Accepts ANY Host header (vulnerable to Host header attacks)

    ssl_certificate /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    ssl_protocols       TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;  # Weak: allows TLSv1.0 and TLSv1.1
    ssl_ciphers         ALL;                                # Weak: allows insecure ciphers
    ssl_prefer_server_ciphers off;                          # Lets client pick weakest cipher

    # === Non-DoS vulnerable settings (students: fix these!) ===
    server_tokens on;                 # Exposes nginx version in headers/error pages
    autoindex on;                     # Enables directory listing for static/media
    proxy_set_header Host $http_host; # Passes raw Host header to backend (Host header injection)

    # === DoS-vulnerable settings (students: fix these!) ===
    client_max_body_size 0;           # No limit on upload size
    client_body_timeout 300s;         # Wait 5 min for slow request bodies
    client_header_timeout 300s;       # Wait 5 min for slow headers (Slowloris)
    send_timeout 300s;                # Wait 5 min to send response
    keepalive_timeout 300s;           # Keep idle connections open 5 min
    keepalive_requests 10000;         # Allow 10k requests per connection
    proxy_read_timeout 600s;          # Wait 10 min for backend response
    proxy_connect_timeout 600s;       # Wait 10 min to connect to backend
    large_client_header_buffers 64 128k;  # Accept huge headers

    # Proxy settings
    location / {
        proxy_pass http://web:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://web:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # No security headers (vulnerable to clickjacking, XSS, MIME sniffing)
    # add_header X-Frame-Options         — MISSING
    # add_header X-Content-Type-Options   — MISSING
    # add_header Content-Security-Policy  — MISSING
    # add_header Strict-Transport-Security — MISSING (no HSTS)
    # add_header Referrer-Policy          — MISSING

    # Optional: Serve static files directly
    location /static {
        alias /app/static;   # Missing trailing slashes = path traversal!
    }

    location /media {
        alias /app/media;    # Missing trailing slashes = path traversal!
    }

    # Dangerously permissive CORS
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "*" always;
    add_header Access-Control-Allow-Credentials "true" always;
}
